name: ours_IXI_x6_MV_LKAN
task: sr_volume     # sr / sr_volume  / MCSR
scale: 6
use_tb_logger: false
model: ref-rec     
gpu_ids: [2]
dist: True
mode: brainseg    #  brainseg >>> brainseg-MCSR
k_loss: False

datasets:
  train:
    mode: brainseg
    task: sr_volume     # sr / sr_volume
    scale: 6
    interval_list: [1]
    random_reverse: true
    border_mode: false
    use_shuffle: true
    n_workers: 2 
    batch_size: 1
    crop_size: 128
    use_flip: True
    use_rot: True
    d_size: 25   
    train_path: "/data3/lpc/dataset/IXI/nii-splitted/train/T2"
    # train_path: "/data3/lpc/dataset/BrainTS/T2_train_nii"
  
  val:
    mode: brainseg
    task: sr_volume    
    scale: 6
    d_size: 25    
    test_path: "/data3/lpc/dataset/IXI/nii-splitted/test/T2"
    # test_path: "/data3/lpc/dataset/BrainTS/T2_test_nii"


network_G:
  which_model_G: MV_LKAN

path:
  pretrain_model_G: ~
  strict_load: False
  resume_state: ~
train:
  lr_G: !!float 1e-4
  lr_scheme: CosineAnnealingLR_Restart
  beta1: 0.9
  beta2: 0.99
  niter: 100000
  warmup_iter: -1
  T_period: [100000]
  restarts: [100000]
  restart_weights: [1]
  eta_min: !!float 1e-5

  pixel_criterion: l1
  pixel_weight: 1.0
  val_freq: !!float 1000

  manual_seed: 0

logger:
  print_freq: 10
  save_checkpoint_freq: !!float 5000
  
